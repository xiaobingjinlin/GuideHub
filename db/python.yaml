examples:
  - id: calculator
    title: 计算器
    ui: calculator
    window:
      width: 480
      height: 720
    notes:
      - "类（class）：用类把显示值、累计值等状态和操作封装在一起，避免散落的全局变量。"
      - "math 模块：提供 sin/cos/log/pi 等；三角函数按弧度，本例先用 radians 把「度」转成弧度。"
      - "lambda 表达式：写成 lambda x: ... 的匿名短函数，适合作为一次性参数传给其它函数。"
      - "高阶函数：像 _unary 这样「接收函数 fn 再调用 fn(value)」的函数，就是高阶函数。"
      - "@staticmethod：表示该方法不依赖实例状态（不用 self），本质是挂在类上的普通函数。"
      - "内置函数 abs：abs 是内置函数、无需 import，没有 math.abs（浮点绝对值可用 math.fabs）。"
      - "友情提示：类中的函数一般叫方法；若它接收或返回函数，则同时仍是高阶函数。"
    code: |
      # GuideHub · Python 示例：计算器（简单 + 科学）
      # 必要说明都写在方法注释里；界面可切换「简单 / 科学」两种按键布局。
      import math

      class Calculator:
          """
          用类把计算器状态集中管理，避免一堆零散变量。

          核心状态：
          - display     : 屏幕上当前显示的字符串（可能含小数点）
          - accumulator : 上一次已确认的数值（等待与下一操作数运算）
          - operator    : 待执行的二元运算符（+ - * / ^），None 表示没有
          - fresh       : True 表示下一次按数字应「覆盖」屏幕，而不是追加
          """

          def __init__(self):
              """初始化 / 重置：屏幕为 0，无累计值、无运算符，等待新输入。"""
              self.display = "0"       # 用户看到的内容，始终用字符串保存便于拼接
              self.accumulator = None  # 还没有按下过运算符时为 None
              self.operator = None     # 例如用户刚按了「+」，这里就是 "+"
              self.fresh = True        # True：下一次数字会替换屏幕，而不是接在后面

          def input_digit(self, digit: str) -> str:
              """
              按下数字键 0–9。

              规则：
              1. 若 fresh 为 True，或当前显示就是 "0"，则用新数字覆盖（避免 0123 这种前导零）。
              2. 否则把数字追加到 display 末尾，实现多位数输入。
              3. 输入后把 fresh 设为 False，后续数字继续追加。

              返回值：更新后的 display，方便界面刷新屏幕。
              """
              if self.fresh or self.display == "0":
                  self.display = digit
              else:
                  self.display += digit
              self.fresh = False
              return self.display

          def input_dot(self) -> str:
              """
              按下小数点「.」。

              规则：
              1. 若刚算完或刚按过运算符（fresh=True），从 "0." 开始输入小数。
              2. 同一段数字里只允许一个小数点；已有「.」则忽略本次按键。
              3. 输入小数点后同样结束 fresh 状态。

              返回值：更新后的 display。
              """
              if self.fresh:
                  self.display = "0."
                  self.fresh = False
                  return self.display
              if "." not in self.display:
                  self.display += "."
              return self.display

          def input_operator(self, op: str) -> str:
              """
              按下二元运算符：+  -  *  /  ^（幂，对应界面 xʸ）。

              流程：
              1. 先调用 _commit()：若已有「左操作数 + 运算符」，用当前屏幕数字完成一次运算；
                 否则把当前屏幕值记入 accumulator。
              2. 记住本次新按下的运算符，供下一次 _commit / equals 使用。
              3. 设 fresh=True，让用户接下来输入的数字覆盖屏幕（作为右操作数）。

              参数 op：运算符字符串，须为 "+"、"-"、"*"、"/"、"^" 之一。
              返回值：_commit 之后的 display（可能已是中间结果）。
              """
              self._commit()
              self.operator = op
              self.fresh = True
              return self.display

          def equals(self) -> str:
              """
              按下等号「=」：立刻结算当前二元运算。

              流程：
              1. _commit() 用 accumulator、operator、当前 display 算出最终结果。
              2. 清空 operator（运算已结束，不再挂着「待算」状态）。
              3. 设 fresh=True，下一次输入从新数字开始。

              返回值：最终结果显示字符串。
              """
              self._commit()
              self.operator = None
              self.fresh = True
              return self.display

          def clear(self) -> str:
              """
              按下清除键「C」：恢复到刚创建对象时的初始状态。

              实现上直接再调一次 __init__，保证四个状态字段全部复位。
              返回值：复位后的 display（"0"）。
              """
              self.__init__()
              return self.display

          # —— 以下为科学计算：对「当前屏幕值」做一元运算；角度使用「度」而非弧度 ——

          def sin(self) -> str:
              """
              正弦：把当前 display 当作角度（度），计算 sin。

              例：display="30" → 约 0.5。
              内部先把度转成弧度再交给 math.sin（Python 标准库使用弧度）。
              """
              return self._unary("sin", lambda x: math.sin(math.radians(x)))

          def cos(self) -> str:
              """
              余弦：当前 display 为角度（度），计算 cos。

              例：display="60" → 0.5。
              """
              return self._unary("cos", lambda x: math.cos(math.radians(x)))

          def tan(self) -> str:
              """
              正切：当前 display 为角度（度），计算 tan。

              例：display="45" → 1。
              注意：接近 90°、270° 等时结果会非常大或溢出，_fmt 可能显示 Error。
              """
              return self._unary("tan", lambda x: math.tan(math.radians(x)))

          def ln(self) -> str:
              """
              自然对数 ln(x)，底数为 e。

              要求 x > 0；非正数时 math.log 会异常/得到无效值，最终可能显示 Error。
              例：先 const_e() 再 ln() → 1。
              """
              return self._unary("ln", math.log)

          def log10(self) -> str:
              """
              常用对数 log10(x)，底数为 10。

              要求 x > 0。例：display="100" → 2。
              """
              return self._unary("log", math.log10)

          def sqrt(self) -> str:
              """
              平方根 √x。

              要求 x ≥ 0；负数会得到无效结果并可能显示 Error。
              例：display="9" → 3。
              """
              return self._unary("√", math.sqrt)

          def square(self) -> str:
              """
              平方 x²，即 x * x。

              例：display="5" → 25。
              """
              return self._unary("x²", lambda x: x * x)

          def reciprocal(self) -> str:
              """
              倒数 1/x。

              x 为 0 时除零，结果无效，界面侧会显示 Error。
              例：display="4" → 0.25。
              """
              return self._unary("1/x", lambda x: 1 / x)

          def abs(self) -> str:
              """
              绝对值 |x|：负数变正，非负保持不变。

              例：display="-7" → 7。
              """
              return self._unary("|x|", abs)

          def const_pi(self) -> str:
              """
              写入圆周率常量 π（约 3.141592653589793）。

              直接覆盖 display，并设 fresh=True，便于接着做一元运算或当作操作数。
              返回值：格式化后的 π 字符串。
              """
              self.display = self._fmt(math.pi)
              self.fresh = True
              return self.display

          def const_e(self) -> str:
              """
              写入自然常数 e（约 2.718281828459045）。

              用法同 const_pi：覆盖屏幕，准备后续运算。
              """
              self.display = self._fmt(math.e)
              self.fresh = True
              return self.display

          def _unary(self, _name, fn) -> str:
              """
              一元运算的公共实现（内部方法，以下划线开头表示「给本类用」）。

              步骤：
              1. 把当前 display 转成 float。
              2. 调用传入的 fn(value) 得到结果。
              3. 用 _fmt 格式化写回 display。
              4. 同步 accumulator，清空 operator，设 fresh=True，
                 这样结果可以直接参与下一步，或被新数字覆盖。

              参数：
              - _name : 函数名，仅用于注释/调试对应（界面表达式另有展示逻辑）
              - fn    : 接收一个 float、返回一个 float 的可调用对象
              """
              value = float(self.display)
              self.display = self._fmt(fn(value))
              self.accumulator = float(self.display) if self.display != "Error" else None
              self.operator = None
              self.fresh = True
              return self.display

          def _commit(self):
              """
              尝试完成一次「挂起的」二元运算（内部方法）。

              两种情况：
              A. 还没有 accumulator 或还没有 operator：
                 只是把当前屏幕值记入 accumulator（首次按运算符时常见）。
              B. 已有左值与运算符：
                 用 accumulator（左）和当前 display（右）按 operator 计算，
                 写回 accumulator；支持 + - * / ^。
                 除数为 0 时写入 nan，后续 _fmt 会变成 "Error"。

              最后把 accumulator 格式化到 display，供屏幕显示中间/最终结果。
              """
              value = float(self.display)
              if self.accumulator is None or self.operator is None:
                  self.accumulator = value
              else:
                  a, b, op = self.accumulator, value, self.operator
                  if op == "+":
                      self.accumulator = a + b
                  elif op == "-":
                      self.accumulator = a - b
                  elif op == "*":
                      self.accumulator = a * b
                  elif op == "/":
                      self.accumulator = a / b if b != 0 else float("nan")
                  elif op == "^":
                      self.accumulator = a ** b
              self.display = self._fmt(self.accumulator)

          @staticmethod
          def _fmt(n) -> str:
              """
              把数值格式化成适合显示的字符串（静态方法：不依赖 self）。

              规则：
              1. NaN 或 ±Inf → "Error"（运算失败时的统一展示）。
              2. 若数值等于其整数形式（如 3.0）→ 显示 "3"，去掉无意义的 .0。
              3. 否则保留小数形式字符串。

              注意：这里不是「截断取整」，而是结果本来就是整数时的美观显示。
              """
              if n != n or n in (float("inf"), float("-inf")):
                  return "Error"
              return str(int(n)) if float(n) == int(n) else str(n)


      # 控制台仅在「发生计算」时输出（数字/小数点不输出）。
      # 更多按键示例见《操作手册.md》。

      if __name__ == "__main__":
          # 本地快速自检：sin(30°) 应为 0.5
          c = Calculator()
          c.input_digit("3")
          c.input_digit("0")
          print(c.sin())  # -> 0.5
  - id: candy
    title: 力扣算法-分发糖果
    ui: candy
    window:
      width: 820
      height: 900
    problem:
      link: "https://leetcode.cn/problems/candy/"
      statement: |
        n 个孩子站成一排。给你一个整数数组 ratings 表示每个孩子的评分。

        你需要按照以下要求，给这些孩子分发糖果：

        - 每个孩子至少分配到 1 个糖果。
        - 相邻两个孩子中，评分更高的那个必须获得更多的糖果。

        请你给每个孩子分发糖果，计算并返回需要准备的 最少 糖果数目。
      hints:
        - "n == ratings.length"
        - "1 <= n <= 2 * 10^4"
        - "0 <= ratings[i] <= 2 * 10^9"
      examples:
        - title: 示例 1
          input: "输入：ratings = [1,0,2]"
          output: "输出：5"
          explanation: "解释：你可以分别给第一个、第二个、第三个孩子分发 2、1、2 颗糖果。"
        - title: 示例 2
          input: "输入：ratings = [1,2,2]"
          output: "输出：4"
          explanation: "解释：你可以分别给第一个、第二个、第三个孩子分发 1、2、1 颗糖果。第三个孩子只得到 1 颗糖果，这满足题面中的两个条件。"
    notes:
      - "列表乘法初始化：candies = [1] * n 得到长度为 n、元素全为 1 的列表。"
      - "range(1, n)：左闭右开，取值 1…n-1，正好遍历除首元素外的下标。"
      - "range(n-2, -1, -1)：从 n-2 倒序走到 0，用于从右往左扫描。"
      - "内置函数 sum：sum(candies) 对列表中的数求和，得到最少糖果总数。"
    code: |
      # GuideHub · LeetCode 135. 分发糖果（Candy）
      # 题目：n 个孩子站成一排，ratings[i] 为评分。
      # 规则：
      #   1. 每个孩子至少 1 颗糖
      #   2. 评分比相邻孩子高的，必须比相邻的拿到更多糖
      # 求：满足规则的最少糖果总数
      # 链接：https://leetcode.cn/problems/candy/


      class Solution:
          def candy(self, ratings: list[int]) -> int:
              """
              两次贪心扫描求最少发糖数。

              思路拆开左右约束，各自扫一遍比硬想「一次定生死」更稳：
              - 左→右：只保证「比左边高 ⇒ 糖比左边多」
              - 右→左：再保证「比右边高 ⇒ 糖比右边多」，并用 max 保住上一遍结果
              """
              n = len(ratings)
              # 每人先发 1 颗，满足「至少一个」的硬性规则
              candies = [1] * n

              # —— 第一遍：从左到右 ——
              # 只看与左邻居的关系；上升坡会形成 1,2,3,... 递增的糖
              for i in range(1, n):
                  if ratings[i] > ratings[i - 1]:
                      candies[i] = candies[i - 1] + 1

              # —— 第二遍：从右到左 ——
              # 只看与右邻居的关系；若右边约束要求更多糖，用 max 抬高，
              # 这样不会把左扫已经加好的值改小
              for i in range(n - 2, -1, -1):
                  if ratings[i] > ratings[i + 1]:
                      candies[i] = max(candies[i], candies[i + 1] + 1)

              # 所有位置糖数之和即为最少总数
              return sum(candies)


      if __name__ == "__main__":
          s = Solution()
          # 示例 1：ratings = [1,0,2] → 分配 [2,1,2]，总和 5
          print(s.candy([1, 0, 2]))  # 5
          # 示例 2：ratings = [1,2,2] → 分配 [1,2,1]，总和 4
          # （中间与右边评分相等，右边可以比中间少）
          print(s.candy([1, 2, 2]))  # 4
  - id: sync-async
    title: 同步与异步
    ui: sync-async
    window:
      width: 720
      height: 820
    notes:
      - "asyncio 模块：用协程与事件循环编写并发，适合大量等待型（IO）任务。"
      - "async def / await：定义协程并用 await 挂起等待；挂起期间事件循环可调度其它任务。"
      - "asyncio.sleep：异步等待，不阻塞整个线程；对照 time.sleep 会堵住当前线程。"
      - "asyncio.gather：并发调度多个协程，等全部完成；等待可重叠，总耗时接近最慢的那个。"
      - "* 解包：任务个数不定时用 *(...) 把可迭代对象拆成位置参数传给 gather。"
      - "return_exceptions=True：某个子任务失败不影响全局，异常作为结果返回，便于一并处理。"
      - "asyncio.run：启动事件循环并跑完一个入口协程，适合脚本里启动异步主流程。"
    code: |
      # GuideHub · 同步与异步
      # 对比：同一批「等待型」任务，同步串行 vs asyncio 并发。
      import asyncio
      import time

      TASK_COUNT = 3
      IO_SLEEP = 0.5


      def fetch_sync(task_id: int) -> str:
          """同步等待：time.sleep 会阻塞当前线程。"""
          time.sleep(IO_SLEEP)
          return f"sync-task-{task_id}-done"


      async def fetch_async(task_id: int) -> str:
          """异步等待：asyncio.sleep 挂起协程，事件循环可去跑别的任务。"""
          await asyncio.sleep(IO_SLEEP)
          return f"async-task-{task_id}-done"


      def run_sync() -> None:
          """一个接一个：总耗时 ≈ TASK_COUNT × IO_SLEEP。"""
          for i in range(TASK_COUNT):
              print(f"同步任务-{i + 1}：开始")
              fetch_sync(i)
              print(f"同步任务-{i + 1}：完成")


      async def run_async() -> None:
          """gather 并发：总耗时 ≈ 一次 IO_SLEEP。"""
          print("异步：同时调度全部任务 …")
          # return_exceptions=True：某个任务失败时不打断其它任务，异常作为结果返回
          await asyncio.gather(
              *(fetch_async(i) for i in range(TASK_COUNT)),
              return_exceptions=True,
          )
          print("异步：全部完成")


      if __name__ == "__main__":
          print("=== 同步 ===")
          t0 = time.perf_counter()
          run_sync()
          print(f"同步耗时 {time.perf_counter() - t0:.2f}s")

          print("=== 异步 ===")
          t1 = time.perf_counter()
          asyncio.run(run_async())
          print(f"异步耗时 {time.perf_counter() - t1:.2f}s")

  - id: concurrency-io
    title: 进程、线程和协程-IO密集型
    ui: concurrency
    kind: io
    window:
      width: 860
      height: 760
    notes:
      - "多线程适合 IO 密集：等待时可切换线程，整体通常快于纯顺序执行。"
      - "多协程适合 IO 密集：等待可重叠，耗时往往接近多线程；任务少时与多线程几乎一样，几十以上任务时协程开销优势才更明显。"
      - "time 模块：本例用 sleep 模拟等待，便于对比四种执行方式的耗时。"
      - "time.perf_counter()：适合测量时间间隔，用结束时刻减开始时刻得到耗时。"
      - "ThreadPoolExecutor / ProcessPoolExecutor：线程池与进程池，接口相近便于对照。"
      - "with：离开代码块时自动关闭线程池/进程池，无需手写繁琐的启停逻辑。"
      - "list(pool.map(...))：map 返回惰性迭代器；list 强制取完所有结果，确保计时覆盖全部任务。"
    code: |
      # 对比：多进程 / 多线程 / 多协程 / 顺序执行 —— 同一批「等待型」任务。
      import asyncio
      import time
      from concurrent.futures import ThreadPoolExecutor, ProcessPoolExecutor

      WORKERS = 4
      IO_SLEEP = 0.4  # 秒，模拟一次网络/磁盘等待


      def io_bound_task(task_id: int) -> str:
          """模拟一次阻塞 IO：真正干活少，大部分时间在等。"""
          time.sleep(IO_SLEEP)
          return f"io-task-{task_id}-done"


      async def io_bound_coro(task_id: int) -> str:
          """异步等待：挂起协程，事件循环可去跑别的任务。"""
          await asyncio.sleep(IO_SLEEP)
          return f"io-task-{task_id}-done"


      def run_serial() -> float:
          """顺序执行：任务一个接一个，等待时间近似累加。"""
          t0 = time.perf_counter()
          for i in range(WORKERS):
              io_bound_task(i)
          return time.perf_counter() - t0


      def run_threads() -> float:
          """多线程：多个线程同时进入 sleep，等待可重叠。"""
          t0 = time.perf_counter()
          with ThreadPoolExecutor(max_workers=WORKERS) as pool:
              # pool.map 返回迭代器（惰性）：只迭代时才会等任务完成并取回结果
              # 外包 list(...)：立刻消费全部结果，确保计时包含「全部任务跑完」
              list(pool.map(io_bound_task, range(WORKERS)))
          return time.perf_counter() - t0


      def run_processes() -> float:
          """多进程：也能并行等待，但进程比线程更重。"""
          t0 = time.perf_counter()
          with ProcessPoolExecutor(max_workers=WORKERS) as pool:
              list(pool.map(io_bound_task, range(WORKERS)))
          return time.perf_counter() - t0


      async def run_coroutines() -> float:
          """多协程：gather 并发等待，总耗时接近一次 sleep。"""
          t0 = time.perf_counter()
          await asyncio.gather(
              *(io_bound_coro(i) for i in range(WORKERS)),
              return_exceptions=True,
          )
          return time.perf_counter() - t0


      if __name__ == "__main__":
          # 多进程在 Windows/macOS 上常用 spawn，必须放在 main 保护下
          print(f"processes : {run_processes():.2f}s")
          print(f"threads   : {run_threads():.2f}s")
          print(f"coroutines: {asyncio.run(run_coroutines()):.2f}s")
          print(f"serial    : {run_serial():.2f}s")
  - id: concurrency-cpu
    title: 进程、线程和协程-CPU密集型
    ui: concurrency
    kind: cpu
    window:
      width: 860
      height: 760
    notes:
      - "GIL：CPython 同一时刻通常只有一个线程执行字节码，CPU 密集时多线程往往难吃满多核。"
      - "多进程适合 CPU 密集：各进程可并行使用多核，通常比多线程 / 多协程更快。"
      - "多协程不擅长 CPU 密集：无让出时近乎串行，耗时往往接近顺序执行。"
      - "ThreadPoolExecutor / ProcessPoolExecutor：本例用二者对照，观察 GIL 对耗时的影响。"
      - "with：离开代码块时自动关闭线程池/进程池，无需手写繁琐的启停逻辑。"
      - "list(pool.map(...))：map 返回惰性迭代器；list 强制取完所有结果，确保计时覆盖全部任务。"
    code: |
      # 对比：多进程 / 多线程 / 多协程 / 顺序执行 —— 同一批「纯计算」任务。
      import asyncio
      import time
      from concurrent.futures import ThreadPoolExecutor, ProcessPoolExecutor

      WORKERS = 4
      CPU_LOOPS = 3_000_000  # 可按机器快慢调整


      def cpu_bound_task(task_id: int) -> int:
          """模拟纯 CPU 计算：几乎不 IO，一直在算。"""
          total = 0
          for i in range(CPU_LOOPS):
              total += i * i
          return total + task_id


      async def cpu_bound_coro(task_id: int) -> int:
          """无 await：不会让出事件循环，gather 后近乎串行。"""
          return cpu_bound_task(task_id)


      def run_serial() -> float:
          """顺序执行：计算一个接一个。"""
          t0 = time.perf_counter()
          for i in range(WORKERS):
              cpu_bound_task(i)
          return time.perf_counter() - t0


      def run_threads() -> float:
          """多线程：受 GIL 影响，CPU 密集往往加速不明显。"""
          t0 = time.perf_counter()
          with ThreadPoolExecutor(max_workers=WORKERS) as pool:
              list(pool.map(cpu_bound_task, range(WORKERS)))
          return time.perf_counter() - t0


      def run_processes() -> float:
          """多进程：多核并行，通常明显更快。"""
          t0 = time.perf_counter()
          with ProcessPoolExecutor(max_workers=WORKERS) as pool:
              list(pool.map(cpu_bound_task, range(WORKERS)))
          return time.perf_counter() - t0


      async def run_coroutines() -> float:
          """多协程：纯计算且无 await 时，耗时接近顺序执行。"""
          t0 = time.perf_counter()
          await asyncio.gather(
              *(cpu_bound_coro(i) for i in range(WORKERS)),
              return_exceptions=True,
          )
          return time.perf_counter() - t0


      if __name__ == "__main__":
          print(f"processes : {run_processes():.2f}s")
          print(f"threads   : {run_threads():.2f}s")
          print(f"coroutines: {asyncio.run(run_coroutines()):.2f}s")
          print(f"serial    : {run_serial():.2f}s")

  - id: main-child-thread
    title: 主线程与子线程
    ui: main-child-thread
    window:
      width: 720
      height: 820
    notes:
      - "threading.Thread：用 target 指定目标函数创建子线程实例，再 start() 才会真正跑起来。"
      - "daemon=True：主程序退出时该子线程会被粗暴回收，不保证跑完或优雅收尾。"
      - "t.join()：让当前线程停下来，等到子线程 t 跑完再继续（演示里用于等任务完成再比总耗时）。"
      - "何时不必 join：主线程工作远长于子线程，或即将退出的 daemon 场景，往往不必再 join。"
    code: |
      # GuideHub · 主线程与子线程
      # 对比：单线程串行（阻塞相加） vs 主子线程并行（墙钟取 max；daemon 粗暴回收）
      import threading
      import time
      from concurrent.futures import ThreadPoolExecutor

      WORKERS = 4
      IO_SLEEP = 0.4
      MAIN_WORK_SLEEP = 0.5


      def with_blocking_work() -> None:
          """
          with 会阻塞当前线程：
          只有线程池任务全部结束，才会离开 with 代码块。
          """
          with ThreadPoolExecutor(max_workers=2) as pool:
              # list 强制等全部任务完成，with 才能退出
              list(pool.map(lambda _i: time.sleep(IO_SLEEP), range(WORKERS)))


      def main_business_work() -> None:
          """模拟主线程后续业务（UI / 继续处理）。"""
          time.sleep(MAIN_WORK_SLEEP)


      def run_single() -> None:
          """单线程：先 with 再业务 → 总时长相加，with 期间主线程被堵住。"""
          print("单线程：进入 with …")
          with_blocking_work()
          print("单线程：离开 with，再做业务 …")
          main_business_work()
          print("单线程：全部结束（耗时 ≈ with + 业务）")


      def run_main_child() -> None:
          """
          主子线程：daemon 子线程跑 with，主线程并行做业务。
          daemon=True：主程序退出时子线程会被粗暴回收。
          """
          def target() -> None:
              print("子线程：进入 with …")
              with_blocking_work()
              print("子线程：离开 with")

          t = threading.Thread(target=target, daemon=True)
          t.start()
          print("主线程：已继续，同步做业务（几乎不被 with 阻塞）")
          main_business_work()
          # 演示里 join 便于观察总耗时；真实退出场景通常不 join daemon
          t.join()
          print("主子线程：全部结束（耗时 ≈ max(with, 业务)）")


      if __name__ == "__main__":
          print("=== 方式 A：单线程 ===")
          run_single()
          print("=== 方式 B：主子线程 ===")
          run_main_child()


  - id: file-io
    title: 文件读写
    ui: file-io
    window:
      width: 560
      height: 720
    notes:
      - "Path(__file__).resolve().parent：当前 py 文件绝对路径的父目录；用 / 可拼接子路径或文件名。"
      - "with open(...)：进入时打开文件流，离开代码块自动关闭，不必手写 f.close()。"
      - "打开模式：r 读、w 写（覆盖）、a 追加。"
      - "encoding=\"utf-8\"：读写文本时建议指定，避免中文乱码。"
    code: |
      # GuideHub · 文件读写
      # 用 with + open() 读写文本；文件落在磁盘，刷新页面后内容仍在。
      from pathlib import Path

      FILE_PATH = Path(__file__).resolve().parent / "memo.txt"
      LINE = "GuideHub：用 with 和 open() 读写文件。"


      def read_content() -> str:
          """读取全部内容；文件不存在则先创建空文件。"""
          if not FILE_PATH.exists():
              with open(FILE_PATH, "w", encoding="utf-8") as f:
                  f.write("")
          with open(FILE_PATH, "r", encoding="utf-8") as f:
              return f.read()


      def append_line(line: str = LINE) -> str:
          """
          追加一句话：
          - 第一段：直接写入
          - 已有内容：与上一段空一行
          """
          current = read_content()
          if current.strip() == "":
              new_content = line
          else:
              new_content = current.rstrip("\n") + "\n\n" + line
          with open(FILE_PATH, "w", encoding="utf-8") as f:
              f.write(new_content)
          return new_content


      def reset_content() -> None:
          """清空文件并保存。"""
          with open(FILE_PATH, "w", encoding="utf-8") as f:
              f.write("")


      if __name__ == "__main__":
          print("当前内容：")
          print(repr(read_content()))
          print("--- 写入 ---")
          print(append_line())
          print("--- 再写入（中间空一行）---")
          print(append_line())
          print("--- 重置 ---")
          reset_content()
          print(repr(read_content()))
